<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markdown ➡ テーブル変換くん v4.0</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --bg: #f4f1ea;
  --surface: #fffdf8;
  --surface-strong: #ffffff;
  --panel: #f8f5ee;  --line: #ddd5c8;
  --text: #231c16;
  --muted: #786d60;
  --accent: #bd5f2d;
  --accent-soft: #f3d7c9;
  --success: #2e8b57;

  --chart-bg: #ffffff;
  --chart-grid: #ece5d8;
  --chart-axis: #8d7f70;
  --series-1: #bd5f2d;
  --series-2: #1f6f78;
  --series-3: #c69214;
  --series-4: #7d6ab3;
  --series-5: #cc4c7a;
  --series-6: #2b8c60;
  --bar-radius: 10;
  --font-size: 14px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(189,95,45,.08), transparent 25%),
    radial-gradient(circle at right 20%, rgba(31,111,120,.08), transparent 22%),
    var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
}

header {
  padding: 24px 32px 18px;
  background: rgba(255, 253, 248, .92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-icon {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: linear-gradient(135deg, #FF8C42 0%, #FFD060 50%, #7DDDE3 100%);
  color: #111;
  display: grid;
  place-items: center;
  font-size: 20px;
  font-weight: 700;
}

.brand h1 {
  margin: 0;
  font-size: 22px;
}

.brand p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.layout {
  display: grid;
  grid-template-columns: 400px 1fr;
  min-height: calc(100vh - 85px);
}

.panel {
  background: rgba(255, 253, 248, .92);
  border-right: 1px solid var(--line);
  overflow-y: auto;
}

.section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
}

.section h2 {
  margin: 0 0 12px;
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

.hint {
  margin: 0 0 10px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}

textarea,
input[type="text"],
select {
  width: 100%;
  border: 1px solid var(--line);
  background: var(--surface-strong);
  color: var(--text);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
}

textarea {
  min-height: 210px;
  resize: vertical;
  line-height: 1.6;
  font-family: Consolas, "Courier New", monospace;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.control {
  margin-bottom: 14px;
}

.control label {
  display: block;
  font-size: 13px;
  margin-bottom: 8px;
}

input[type="range"] {
  width: 100%;
}

.toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 0;
}

.toggle input {
  width: 18px;
  height: 18px;
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.theme-btn {
  border: 1px solid var(--line);
  background: var(--surface-strong);
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
}

.theme-btn.active {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}

.theme-swatches {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

.theme-swatch {
  width: 18px;
  height: 18px;
  border-radius: 999px;
}

.theme-name {
  font-size: 12px;
  color: var(--muted);
}

.actions {
  padding: 20px 24px 28px;
  display: grid;
  gap: 10px;
}

.file-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 10px;
}

.file-name {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

button {
  border: none;
  border-radius: 14px;
  cursor: pointer;
  padding: 13px 14px;
  font-size: 14px;
  font-weight: 700;
}

.btn-primary {
  background: linear-gradient(135deg, #bd5f2d, #d08c22);
  color: #fff;
}

.btn-secondary {
  background: var(--surface-strong);
  border: 1px solid var(--line);
  color: var(--text);
}

.preview {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.preview-head {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 253, 248, .92);
}

.status {
  font-size: 12px;
  color: var(--muted);
}

.status.ready {
  color: var(--success);
}

.preview-stage {
  flex: 1;
  overflow: auto;
  padding: 34px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#captureTarget {
  width: min(100%, 1200px);
  background: var(--chart-bg);
  border-radius: 24px;
  box-shadow: 0 30px 80px rgba(32, 24, 18, .12);
  padding: 28px 28px 22px;
}

.empty {
  padding: 90px 30px;
  text-align: center;
  color: var(--muted);
  line-height: 1.8;
}

.chart-header {
  margin-bottom: 18px;
}

.chart-title {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.25;
  margin: 0;
}

.chart-subtitle {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.6;
}

.chart-svg {
  width: 100%;
  height: auto;
  display: block;
}

table.data-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 15px;
}

table.data-table th,
table.data-table td {
  border: 1px solid var(--chart-grid);
  padding: 12px 14px;
  text-align: left;
  overflow-wrap: anywhere;
}

table.data-table th {
  background: var(--table-header-bg, var(--accent));
  color: var(--table-header-text, #ffffff);
  font-weight: 800;
}

table.data-table tbody tr:nth-child(even) td {
  background: var(--table-alt-bg, #faf7f1);
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 18px;
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
}

.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.legend-chip {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  flex: 0 0 auto;
}

.footer-note {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #f0eadf;
  color: var(--muted);
  font-size: 12px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%) translateY(90px);
  background: #2d241c;
  color: #fff;
  border-radius: 999px;
  padding: 12px 18px;
  font-size: 13px;
  transition: transform .25s ease;
  z-index: 30;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .panel {
    border-right: none;
    border-bottom: 1px solid var(--line);
  }

  .preview-stage {
    padding: 18px;
  }

  #captureTarget {
    padding: 20px 18px 18px;
  }
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">MT</div>
    <div>
      <h1>Markdown ➡ テーブル変換くん v4.0</h1>
      <p>CSV・TSV・Markdown表を、noteに貼りやすいグラフPNGへ変換</p>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="panel">
    <div class="section">
      <h2>Data Input</h2>
      <p class="hint">1列目をラベル、2列目以降を数値として扱います。Markdown表、CSV、TSV、スプレッドシート貼り付けに対応します。</p>
      <textarea id="dataInput" placeholder="| 月 | 売上 | 目標 |
|---|---:|---:|
| 1月 | 120 | 100 |
| 2月 | 135 | 110 |
| 3月 | 168 | 130 |
| 4月 | 155 | 140 |"></textarea>
      <div class="file-row">
        <label class="btn-secondary" for="fileInput" style="cursor:pointer">CSV / TSV を選択</label>
        <input id="fileInput" type="file" accept=".csv,.tsv,.txt,.md" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none">
      </div>
      <div class="file-name" id="fileName">ファイル未選択。コピペ入力でも使えます。</div>
    </div>

    <div class="section">
      <h2>Chart Setup</h2>
      <div class="control">
        <label for="chartTitle">タイトル</label>
        <input id="chartTitle" type="text" value="月別売上の推移">
      </div>
      <div class="control">
        <label for="chartSubtitle">補足</label>
        <input id="chartSubtitle" type="text" value="2026年上期の売上実績。note掲載向けに見やすく整形。">
      </div>
      <div class="row">
        <div class="control">
          <label for="outputMode">出力モード</label>
          <select id="outputMode">
            <option value="chart">グラフ</option>
            <option value="table">表</option>
          </select>
        </div>
        <div class="control">
          <label for="chartType">グラフ種類</label>
          <select id="chartType">
            <option value="bar">棒グラフ</option>
            <option value="line">折れ線グラフ</option>
            <option value="area">エリアグラフ</option>
            <option value="grouped-bar">集合棒グラフ</option>
            <option value="stacked-bar">積み上げ棒グラフ</option>
            <option value="scatter">散布図</option>
            <option value="pie">円グラフ</option>
          </select>
        </div>
        <div class="control">
          <label for="chartSize">画像サイズ</label>
          <select id="chartSize">
            <option value="wide">横長 1200x675</option>
            <option value="square">正方形 1080x1080</option>
            <option value="tall">縦長 1080x1350</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="control">
          <label for="labelColumn">ラベル列</label>
          <select id="labelColumn"></select>
        </div>
        <div class="control">
          <label for="seriesIndex">使用する数値列</label>
          <select id="seriesIndex"></select>
        </div>
        <div class="control">
          <label for="seriesIndexSecondary">第2数値列</label>
          <select id="seriesIndexSecondary"></select>
        </div>
        <div class="control">
          <label for="valueUnit">単位</label>
          <input id="valueUnit" type="text" value="万円">
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Visual</h2>
      <div class="control">
        <label for="fontScale">文字サイズ <span id="fontScaleValue">100%</span></label>
        <input id="fontScale" type="range" min="85" max="125" value="100">
      </div>
      <div class="control">
        <label for="barRadius">角丸 <span id="barRadiusValue">10</span></label>
        <input id="barRadius" type="range" min="0" max="22" value="10">
      </div>
      <div class="toggle">
        <label for="showLegend">凡例を表示</label>
        <input id="showLegend" type="checkbox" checked>
      </div>
      <div class="toggle">
        <label for="showValues">値ラベルを表示</label>
        <input id="showValues" type="checkbox" checked>
      </div>
      <div class="toggle">
        <label for="showMarkers">折れ点を表示</label>
        <input id="showMarkers" type="checkbox" checked>
      </div>
      <div class="toggle">
        <label for="showGrid">補助線を表示</label>
        <input id="showGrid" type="checkbox" checked>
      </div>
    </div>

    <div class="section">
      <h2>Custom Colors</h2>
      <div class="row">
        <div class="control">
          <label for="customHeaderBg">表ヘッダー背景</label>
          <input id="customHeaderBg" type="color" value="#bd5f2d">
        </div>
        <div class="control">
          <label for="customHeaderText">表ヘッダー文字</label>
          <input id="customHeaderText" type="color" value="#ffffff">
        </div>
      </div>
      <div class="row">
        <div class="control">
          <label for="customSeries1">グラフ主色</label>
          <input id="customSeries1" type="color" value="#bd5f2d">
        </div>
        <div class="control">
          <label for="customSeries2">グラフ副色</label>
          <input id="customSeries2" type="color" value="#1f6f78">
        </div>
      </div>
      <div class="row">
        <div class="control">
          <label for="customGridColor">補助線色</label>
          <input id="customGridColor" type="color" value="#ece5d8">
        </div>
        <div class="control">
          <label for="customAxisColor">軸色</label>
          <input id="customAxisColor" type="color" value="#8d7f70">
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Theme</h2>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="renderBtn">プレビュー更新</button>
      <button class="btn-secondary" id="copyBtn">画像をクリップボードへコピー</button>
      <button class="btn-secondary" id="pngBtn">PNGで保存</button>
      <button class="btn-secondary" id="sampleBtn">サンプルを読み込む</button>
    </div>
  </aside>

  <main class="preview">
    <div class="preview-head">
      <strong>Preview</strong>
      <span class="status" id="statusText">未描画</span>
    </div>
    <div class="preview-stage">
      <div id="captureTarget">
        <div class="empty">左にデータを貼り付けて、<br>「プレビュー更新」を押してください。</div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast">完了しました</div>

<script>
const THEMES = [
  {
    name: "Terracotta",
    accent: "#bd5f2d",
    bg: "#ffffff",
    grid: "#ece5d8",
    axis: "#8d7f70",
    series: ["#bd5f2d", "#1f6f78", "#c69214", "#7d6ab3", "#cc4c7a", "#2b8c60"]
  },
  {
    name: "Marine",
    accent: "#176b87",
    bg: "#ffffff",
    grid: "#dfeaf1",
    axis: "#6a7c88",
    series: ["#176b87", "#64ccc5", "#0f4c75", "#f4a261", "#8d99ae", "#7b2cbf"]
  },
  {
    name: "Forest",
    accent: "#3a7d44",
    bg: "#ffffff",
    grid: "#e3efe2",
    axis: "#6f7d6b",
    series: ["#3a7d44", "#a4c3a2", "#588157", "#bc6c25", "#6c757d", "#7f5539"]
  },
  {
    name: "Mono Ink",
    accent: "#222222",
    bg: "#ffffff",
    grid: "#ebebeb",
    axis: "#6a6a6a",
    series: ["#222222", "#575757", "#8f8f8f", "#b6b6b6", "#3a86ff", "#ff006e"]
  },
  {
    name: "Berry",
    accent: "#b3396b",
    bg: "#ffffff",
    grid: "#f2dce5",
    axis: "#8f6b7b",
    series: ["#b3396b", "#3f88c5", "#f6aa1c", "#6b4f9d", "#0d9488", "#d97706"]
  },
  {
    name: "Sunrise",
    accent: "#d97706",
    bg: "#ffffff",
    grid: "#f8ead1",
    axis: "#8c7552",
    series: ["#d97706", "#ef4444", "#0f766e", "#2563eb", "#a855f7", "#65a30d"]
  }
];

const SIZE_PRESETS = {
  wide: { width: 1200, height: 675 },
  square: { width: 1080, height: 1080 },
  tall: { width: 1080, height: 1350 }
};

const state = {
  parsed: null,
  currentTheme: 0
};

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2200);
}

async function loadSelectedFile(file) {
  if (!file) return;
  const text = await file.text();
  document.getElementById("dataInput").value = text.replace(/^\uFEFF/, "");
  document.getElementById("labelColumn").value = "";
  document.getElementById("fileName").textContent = `読込済み: ${file.name}`;
  renderChart();
  showToast(`${file.name} を読み込みました`);
}

function buildThemeGrid() {
  const root = document.getElementById("themeGrid");
  root.innerHTML = "";
  THEMES.forEach((theme, index) => {
    const button = document.createElement("button");
    button.className = "theme-btn" + (index === state.currentTheme ? " active" : "");
    button.type = "button";
    button.innerHTML = `
      <div class="theme-swatches">
        ${theme.series.slice(0, 4).map(color => `<span class="theme-swatch" style="background:${color}"></span>`).join("")}
      </div>
      <div class="theme-name">${escapeHtml(theme.name)}</div>
    `;
    button.addEventListener("click", () => {
      state.currentTheme = index;
      applyThemePreset(theme);
      buildThemeGrid();
      renderChart();
    });
    root.appendChild(button);
  });
}

function applyThemePreset(theme) {
  document.getElementById("customHeaderBg").value = theme.accent;
  document.getElementById("customHeaderText").value = "#ffffff";
  document.getElementById("customSeries1").value = theme.series[0];
  document.getElementById("customSeries2").value = theme.series[1];
  document.getElementById("customGridColor").value = theme.grid;
  document.getElementById("customAxisColor").value = theme.axis;
}

function detectDelimiter(text) {
  const sampleLines = text
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean)
    .slice(0, 5);
  if (!sampleLines.length) return ",";

  const candidates = ["\t", ";", ",", "|"];
  const scores = candidates.map(delimiter => ({
    delimiter,
    score: sampleLines.reduce((sum, line) => sum + parseDelimitedLine(line, delimiter).length, 0)
  }));

  scores.sort((a, b) => b.score - a.score);
  return scores[0].score > sampleLines.length ? scores[0].delimiter : ",";
}

function parseDelimitedLine(line, delimiter) {
  if (delimiter === "|") {
    let text = line.trim();
    if (text.startsWith("|")) text = text.slice(1);
    if (text.endsWith("|")) text = text.slice(0, -1);
    return text.split("|").map(cell => cell.trim());
  }

  const cells = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i += 1) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === delimiter && !inQuotes) {
      cells.push(current.trim());
      current = "";
    } else {
      current += ch;
    }
  }
  cells.push(current.trim());
  return cells;
}

function isMarkdownSeparatorRow(cells) {
  return cells.every(cell => /^:?-{3,}:?$/.test(cell.replace(/\s/g, "")));
}

function parseInputTable(raw) {
  const lines = raw
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean);
  if (lines.length < 2) return null;

  const delimiter = detectDelimiter(raw);
  const rows = lines.map(line => parseDelimitedLine(line, delimiter));
  const header = rows[0];
  const body = isMarkdownSeparatorRow(rows[1]) ? rows.slice(2) : rows.slice(1);
  if (!header.length || !body.length) return null;

  const normalized = body.map(row => {
    const padded = row.slice(0, header.length);
    while (padded.length < header.length) padded.push("");
    return padded;
  });

  return {
    header,
    rows: normalized
  };
}

function detectBestLabelColumn(parsed) {
  const scores = parsed.header.map((_, columnIndex) => {
    const values = parsed.rows.map(row => row[columnIndex] ?? "").filter(value => String(value).trim() !== "");
    const nonNumericCount = values.filter(value => toNumber(value) === null).length;
    return {
      columnIndex,
      score: nonNumericCount
    };
  });
  scores.sort((a, b) => b.score - a.score);
  return scores[0]?.score > 0 ? scores[0].columnIndex : 0;
}

function buildSeriesFromLabelColumn(parsed, labelColumnIndex) {
  return parsed.header
    .map((name, columnIndex) => ({ key: columnIndex, name: name || `Series ${columnIndex + 1}` }))
    .filter(series => series.key !== labelColumnIndex);
}

function toNumber(value) {
  const normalized = String(value)
    .replace(/[,\s]/g, "")
    .replace(/[%￥¥円万億]/g, "");
  const number = Number(normalized);
  return Number.isFinite(number) ? number : null;
}

function populateSeriesSelect(parsed) {
  const labelSelect = document.getElementById("labelColumn");
  const select = document.getElementById("seriesIndex");
  const secondary = document.getElementById("seriesIndexSecondary");
  const previousLabel = labelSelect.value;
  const previous = select.value;
  const previousSecondary = secondary.value;
  labelSelect.innerHTML = "";
  select.innerHTML = "";
  secondary.innerHTML = "";
  parsed.header.forEach((name, index) => {
    const option = document.createElement("option");
    option.value = String(index);
    option.textContent = name || `列 ${index + 1}`;
    labelSelect.appendChild(option);
  });

  const prevLabelIdx = parseInt(previousLabel, 10);
  const labelColumnIndex = (!isNaN(prevLabelIdx) && parsed.header[prevLabelIdx]) ? prevLabelIdx : detectBestLabelColumn(parsed);
  labelSelect.value = String(labelColumnIndex);
  const seriesList = buildSeriesFromLabelColumn(parsed, labelColumnIndex);

  seriesList.forEach((series, index) => {
    const option = document.createElement("option");
    option.value = String(index);
    option.textContent = series.name;
    select.appendChild(option);

    const optionSecondary = document.createElement("option");
    optionSecondary.value = String(index);
    optionSecondary.textContent = series.name;
    secondary.appendChild(optionSecondary);
  });
  parsed.series = seriesList;

  if (parsed.series.length === 0) {
    const option = document.createElement("option");
    option.value = "0";
    option.textContent = "系列なし";
    select.appendChild(option);
    secondary.appendChild(option.cloneNode(true));
  }
  select.value = parsed.series[Number(previous)] ? previous : "0";
  secondary.value = parsed.series[Number(previousSecondary)] ? previousSecondary : String(Math.min(1, Math.max(parsed.series.length - 1, 0)));
}

function applyThemeVariables() {
  const theme = THEMES[state.currentTheme];
  const root = document.documentElement;
  const customSeries1 = document.getElementById("customSeries1").value || theme.series[0];
  const customSeries2 = document.getElementById("customSeries2").value || theme.series[1];
  const customGrid = document.getElementById("customGridColor").value || theme.grid;
  const customAxis = document.getElementById("customAxisColor").value || theme.axis;
  const headerBg = document.getElementById("customHeaderBg").value || theme.accent;
  const headerText = document.getElementById("customHeaderText").value || "#ffffff";
  const seriesPalette = [customSeries1, customSeries2, ...theme.series.slice(2)];

  root.style.setProperty("--accent", customSeries1);
  root.style.setProperty("--chart-bg", theme.bg);
  root.style.setProperty("--chart-grid", customGrid);
  root.style.setProperty("--chart-axis", customAxis);
  root.style.setProperty("--table-header-bg", headerBg);
  root.style.setProperty("--table-header-text", headerText);
  root.style.setProperty("--table-alt-bg", `${customGrid}33`);
  seriesPalette.forEach((color, index) => {
    root.style.setProperty(`--series-${index + 1}`, color);
  });

  return {
    ...theme,
    accent: customSeries1,
    grid: customGrid,
    axis: customAxis,

  };
}

function getCurrentSeriesData(parsed) {
  const labelColumnIndex = Number(document.getElementById("labelColumn").value || 0);
  const selectedSeriesIndex = Number(document.getElementById("seriesIndex").value || 0);
  const series = parsed.series[selectedSeriesIndex];
  if (!series) return null;

  const points = parsed.rows
    .map(row => ({
      label: row[labelColumnIndex],
      value: toNumber(row[series.key])
    }))
    .filter(point => point.value !== null);

  if (!points.length) return null;

  return {
    series,
    points
  };
}

function getAllSeriesData(parsed) {
  const labelColumnIndex = Number(document.getElementById("labelColumn").value || 0);
  return parsed.series
    .map(series => {
      const points = parsed.rows
        .map(row => ({
          label: row[labelColumnIndex],
          value: toNumber(row[series.key])
        }))
        .filter(point => point.value !== null);

      return points.length ? { series, points } : null;
    })
    .filter(Boolean);
}

function getScatterSeriesData(parsed) {
  const labelColumnIndex = Number(document.getElementById("labelColumn").value || 0);
  const primaryIndex = Number(document.getElementById("seriesIndex").value || 0);
  const secondaryIndex = Number(document.getElementById("seriesIndexSecondary").value || 0);
  const xSeries = parsed.series[primaryIndex];
  const ySeries = parsed.series[secondaryIndex];
  if (!xSeries || !ySeries || xSeries.key === ySeries.key) return null;

  const points = parsed.rows
    .map(row => ({
      label: row[labelColumnIndex],
      x: toNumber(row[xSeries.key]),
      y: toNumber(row[ySeries.key])
    }))
    .filter(point => point.x !== null && point.y !== null);

  if (!points.length) return null;

  return { xSeries, ySeries, points };
}

function formatValue(value) {
  const unit = document.getElementById("valueUnit").value.trim();
  const text = Number(value).toLocaleString("ja-JP");
  return unit ? `${text}${unit}` : text;
}

function getScaledFont(base) {
  const scale = Number(document.getElementById("fontScale").value || 100) / 100;
  return Math.round(base * scale);
}

function buildSvgFrame(size) {
  const top = 34;
  const side = 28;
  const footer = 20;
  const titleBlock = 96;
  return {
    width: size.width,
    height: size.height,
    chartLeft: side + 72,
    chartRight: size.width - side - 28,
    chartTop: top + titleBlock,
    chartBottom: size.height - side - footer - 60
  };
}

function buildBarChart(points, size, theme) {
  const frame = buildSvgFrame(size);
  const chartWidth = frame.chartRight - frame.chartLeft;
  const chartHeight = frame.chartBottom - frame.chartTop;
  const max = Math.max(...points.map(point => point.value), 1);
  const steps = 5;
  const barGap = Math.max(16, chartWidth * 0.03);
  const slotWidth = chartWidth / points.length;
  const barWidth = Math.min(78, slotWidth - barGap);
  const grid = [];
  const bars = [];
  const labels = [];
  const values = [];
  const showGrid = document.getElementById("showGrid").checked;
  const showValues = document.getElementById("showValues").checked;
  const radius = Number(document.getElementById("barRadius").value || 10);

  for (let i = 0; i <= steps; i += 1) {
    const value = (max / steps) * i;
    const y = frame.chartBottom - (chartHeight * i / steps);
    if (showGrid) {
      grid.push(`<line x1="${frame.chartLeft}" y1="${y}" x2="${frame.chartRight}" y2="${y}" stroke="${theme.grid}" stroke-width="1" />`);
    }
    labels.push(`<text x="${frame.chartLeft - 14}" y="${y + 5}" text-anchor="end" font-size="${getScaledFont(13)}" fill="${theme.axis}">${escapeHtml(formatValue(Math.round(value)))}</text>`);
  }

  points.forEach((point, index) => {
    const height = Math.max(2, chartHeight * (point.value / max));
    const x = frame.chartLeft + slotWidth * index + (slotWidth - barWidth) / 2;
    const y = frame.chartBottom - height;
    const color = theme.series[index % theme.series.length];
    bars.push(`<rect x="${x}" y="${y}" width="${barWidth}" height="${height}" rx="${radius}" fill="${color}" />`);
    labels.push(`<text x="${x + barWidth / 2}" y="${frame.chartBottom + 24}" text-anchor="middle" font-size="${getScaledFont(14)}" fill="${theme.axis}">${escapeHtml(point.label)}</text>`);
    if (showValues) {
      values.push(`<text x="${x + barWidth / 2}" y="${y - 10}" text-anchor="middle" font-size="${getScaledFont(13)}" font-weight="700" fill="${color}">${escapeHtml(formatValue(point.value))}</text>`);
    }
  });

  return `
    <svg class="chart-svg" viewBox="0 0 ${size.width} ${size.height}" role="img" aria-label="bar chart">
      ${grid.join("")}
      <line x1="${frame.chartLeft}" y1="${frame.chartBottom}" x2="${frame.chartRight}" y2="${frame.chartBottom}" stroke="${theme.axis}" stroke-width="1.5" />
      ${labels.join("")}
      ${bars.join("")}
      ${values.join("")}
    </svg>
  `;
}

}

function buildGroupedBarChart(allSeries, size, theme) {
  const frame = buildSvgFrame(size);
  const chartWidth = frame.chartRight - frame.chartLeft;
  const chartHeight = frame.chartBottom - frame.chartTop;
  const rowCount = Math.max(...allSeries.map(item => item.points.length), 0);
  const max = Math.max(...allSeries.flatMap(item => item.points.map(point => point.value)), 1);
  const steps = 5;
  const showGrid = document.getElementById("showGrid").checked;
  const showValues = document.getElementById("showValues").checked;
  const labels = [];
  const grid = [];
  const bars = [];
  const values = [];
  const categoryGap = Math.max(18, chartWidth * 0.025);
  const slotWidth = chartWidth / Math.max(rowCount, 1);
  const groupInnerGap = 8;
  const barWidth = Math.max(10, Math.min(48, (slotWidth - categoryGap - groupInnerGap * (allSeries.length - 1)) / Math.max(allSeries.length, 1)));
  const radius = Number(document.getElementById("barRadius").value || 10);

  for (let i = 0; i <= steps; i += 1) {
    const value = (max / steps) * i;
    const y = frame.chartBottom - (chartHeight * i / steps);
    if (showGrid) {
      grid.push(`<line x1="${frame.chartLeft}" y1="${y}" x2="${frame.chartRight}" y2="${y}" stroke="${theme.grid}" stroke-width="1" />`);
    }
    labels.push(`<text x="${frame.chartLeft - 14}" y="${y + 5}" text-anchor="end" font-size="${getScaledFont(13)}" fill="${theme.axis}">${escapeHtml(formatValue(Math.round(value)))}</text>`);
  }

  for (let rowIndex = 0; rowIndex < rowCount; rowIndex += 1) {
    const baseX = frame.chartLeft + slotWidth * rowIndex + (slotWidth - (barWidth * allSeries.length + groupInnerGap * (allSeries.length - 1))) / 2;
    const label = allSeries[0].points[rowIndex]?.label || "";
    labels.push(`<text x="${frame.chartLeft + slotWidth * rowIndex + slotWidth / 2}" y="${frame.chartBottom + 24}" text-anchor="middle" font-size="${getScaledFont(14)}" fill="${theme.axis}">${escapeHtml(label)}</text>`);

    allSeries.forEach((entry, seriesIndex) => {
      const point = entry.points[rowIndex];
      if (!point) return;
      const height = Math.max(2, chartHeight * (point.value / max));
      const x = baseX + seriesIndex * (barWidth + groupInnerGap);
      const y = frame.chartBottom - height;
      const color = theme.series[seriesIndex % theme.series.length];
      bars.push(`<rect x="${x}" y="${y}" width="${barWidth}" height="${height}" rx="${radius}" fill="${color}" />`);
      if (showValues) {
        values.push(`<text x="${x + barWidth / 2}" y="${y - 10}" text-anchor="middle" font-size="${getScaledFont(12)}" font-weight="700" fill="${color}">${escapeHtml(formatValue(point.value))}</text>`);
      }
    });
  }

  return `
    <svg class="chart-svg" viewBox="0 0 ${size.width} ${size.height}" role="img" aria-label="grouped bar chart">
      ${grid.join("")}
      <line x1="${frame.chartLeft}" y1="${frame.chartBottom}" x2="${frame.chartRight}" y2="${frame.chartBottom}" stroke="${theme.axis}" stroke-width="1.5" />
      ${labels.join("")}
      ${bars.join("")}
      ${values.join("")}
    </svg>
  `;
}

function buildStackedBarChart(allSeries, size, theme) {
  const frame = buildSvgFrame(size);
  const chartWidth = frame.chartRight - frame.chartLeft;
  const chartHeight = frame.chartBottom - frame.chartTop;
  const rowCount = Math.max(...allSeries.map(item => item.points.length), 0);
  const totals = Array.from({ length: rowCount }, (_, rowIndex) =>
    allSeries.reduce((sum, entry) => sum + (entry.points[rowIndex]?.value || 0), 0)
  );
  const max = Math.max(...totals, 1);
  const steps = 5;
  const showGrid = document.getElementById("showGrid").checked;
  const showValues = document.getElementById("showValues").checked;
  const labels = [];
  const grid = [];
  const bars = [];
  const values = [];
  const slotWidth = chartWidth / Math.max(rowCount, 1);
  const barWidth = Math.min(84, slotWidth * 0.62);
  const radius = Number(document.getElementById("barRadius").value || 10);

  for (let i = 0; i <= steps; i += 1) {
    const value = (max / steps) * i;
    const y = frame.chartBottom - (chartHeight * i / steps);
    if (showGrid) {
      grid.push(`<line x1="${frame.chartLeft}" y1="${y}" x2="${frame.chartRight}" y2="${y}" stroke="${theme.grid}" stroke-width="1" />`);
    }
    labels.push(`<text x="${frame.chartLeft - 14}" y="${y + 5}" text-anchor="end" font-size="${getScaledFont(13)}" fill="${theme.axis}">${escapeHtml(formatValue(Math.round(value)))}</text>`);
  }

  for (let rowIndex = 0; rowIndex < rowCount; rowIndex += 1) {
    const x = frame.chartLeft + slotWidth * rowIndex + (slotWidth - barWidth) / 2;
    const label = allSeries[0].points[rowIndex]?.label || "";
    let currentTop = frame.chartBottom;
    labels.push(`<text x="${frame.chartLeft + slotWidth * rowIndex + slotWidth / 2}" y="${frame.chartBottom + 24}" text-anchor="middle" font-size="${getScaledFont(14)}" fill="${theme.axis}">${escapeHtml(label)}</text>`);

    allSeries.forEach((entry, seriesIndex) => {
      const point = entry.points[rowIndex];
      if (!point || point.value <= 0) return;
      const height = chartHeight * (point.value / max);
      const y = currentTop - height;
      const color = theme.series[seriesIndex % theme.series.length];
      const rx = seriesIndex === allSeries.length - 1 ? radius : 0;
      bars.push(`<rect x="${x}" y="${y}" width="${barWidth}" height="${height}" rx="${rx}" fill="${color}" />`);
      currentTop = y;
    });

    if (showValues) {
      values.push(`<text x="${x + barWidth / 2}" y="${currentTop - 10}" text-anchor="middle" font-size="${getScaledFont(12)}" font-weight="700" fill="${theme.axis}">${escapeHtml(formatValue(totals[rowIndex]))}</text>`);
    }
  }

  return `
    <svg class="chart-svg" viewBox="0 0 ${size.width} ${size.height}" role="img" aria-label="stacked bar chart">
      ${grid.join("")}
      <line x1="${frame.chartLeft}" y1="${frame.chartBottom}" x2="${frame.chartRight}" y2="${frame.chartBottom}" stroke="${theme.axis}" stroke-width="1.5" />
      ${labels.join("")}
      ${bars.join("")}
      ${values.join("")}
    </svg>
  `;
}

function buildScatterChart(scatterData, size, theme) {
  const frame = buildSvgFrame(size);
  const chartWidth = frame.chartRight - frame.chartLeft;
  const chartHeight = frame.chartBottom - frame.chartTop;
  const maxX = Math.max(...scatterData.points.map(point => point.x), 1);
  const maxY = Math.max(...scatterData.points.map(point => point.y), 1);
  const steps = 5;
  const showGrid = document.getElementById("showGrid").checked;
  const showValues = document.getElementById("showValues").checked;
  const labels = [];
  const grid = [];
  const pointsSvg = [];

  for (let i = 0; i <= steps; i += 1) {
    const x = frame.chartLeft + chartWidth * i / steps;
    const y = frame.chartBottom - chartHeight * i / steps;
    if (showGrid) {
      grid.push(`<line x1="${frame.chartLeft}" y1="${y}" x2="${frame.chartRight}" y2="${y}" stroke="${theme.grid}" stroke-width="1" />`);
      grid.push(`<line x1="${x}" y1="${frame.chartTop}" x2="${x}" y2="${frame.chartBottom}" stroke="${theme.grid}" stroke-width="1" />`);
    }
    labels.push(`<text x="${frame.chartLeft - 14}" y="${y + 5}" text-anchor="end" font-size="${getScaledFont(13)}" fill="${theme.axis}">${escapeHtml(formatValue(Math.round(maxY * i / steps)))}</text>`);
    labels.push(`<text x="${x}" y="${frame.chartBottom + 24}" text-anchor="middle" font-size="${getScaledFont(13)}" fill="${theme.axis}">${escapeHtml(formatValue(Math.round(maxX * i / steps)))}</text>`);
  }

  scatterData.points.forEach((point, index) => {
    const x = frame.chartLeft + chartWidth * (point.x / maxX);
    const y = frame.chartBottom - chartHeight * (point.y / maxY);
    const color = theme.series[index % theme.series.length];
    pointsSvg.push(`<circle cx="${x}" cy="${y}" r="8" fill="${color}" fill-opacity="0.85" stroke="#fff" stroke-width="3" />`);
    pointsSvg.push(`<text x="${x}" y="${y - 14}" text-anchor="middle" font-size="${getScaledFont(12)}" fill="${theme.axis}">${escapeHtml(point.label)}</text>`);
    if (showValues) {
      pointsSvg.push(`<text x="${x}" y="${y + 26}" text-anchor="middle" font-size="${getScaledFont(11)}" fill="${color}">${escapeHtml(`${point.x}, ${point.y}`)}</text>`);
    }
  });

  return `
    <svg class="chart-svg" viewBox="0 0 ${size.width} ${size.height}" role="img" aria-label="scatter chart">
      ${grid.join("")}
      <line x1="${frame.chartLeft}" y1="${frame.chartBottom}" x2="${frame.chartRight}" y2="${frame.chartBottom}" stroke="${theme.axis}" stroke-width="1.5" />
      <line x1="${frame.chartLeft}" y1="${frame.chartBottom}" x2="${frame.chartLeft}" y2="${frame.chartTop}" stroke="${theme.axis}" stroke-width="1.5" />
      ${labels.join("")}
      ${pointsSvg.join("")}
      <text x="${(frame.chartLeft + frame.chartRight) / 2}" y="${size.height - 8}" text-anchor="middle" font-size="${getScaledFont(13)}" fill="${theme.axis}">${escapeHtml(scatterData.xSeries.name)}</text>
      <text x="26" y="${(frame.chartTop + frame.chartBottom) / 2}" text-anchor="middle" font-size="${getScaledFont(13)}" fill="${theme.axis}" transform="rotate(-90 26 ${(frame.chartTop + frame.chartBottom) / 2})">${escapeHtml(scatterData.ySeries.name)}</text>
    </svg>
  `;
}

function buildPieChart(points, size, theme) {
  const width = size.width;
  const height = size.height;
  const cx = width / 2;
  const cy = height / 2 + 20;
  const radius = Math.min(width, height) * 0.24;
  const innerRadius = radius * 0.56;
  const total = points.reduce((sum, point) => sum + point.value, 0);
  const slices = [];
  const showValues = document.getElementById("showValues").checked;
  let startAngle = -Math.PI / 2;

  points.forEach((point, index) => {
    const angle = total === 0 ? 0 : (point.value / total) * Math.PI * 2;
    const endAngle = startAngle + angle;
    const x1 = cx + radius * Math.cos(startAngle);
    const y1 = cy + radius * Math.sin(startAngle);
    const x2 = cx + radius * Math.cos(endAngle);
    const y2 = cy + radius * Math.sin(endAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const color = theme.series[index % theme.series.length];
    const path = [
      `M ${cx} ${cy}`,
      `L ${x1} ${y1}`,
      `A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`,
      "Z"
    ].join(" ");
    slices.push(`<path d="${path}" fill="${color}" />`);

    if (showValues) {
      const mid = startAngle + angle / 2;
      const labelX = cx + (radius + 34) * Math.cos(mid);
      const labelY = cy + (radius + 34) * Math.sin(mid);
      const percent = Math.round((point.value / total) * 100);
      slices.push(`<text x="${labelX}" y="${labelY}" text-anchor="middle" font-size="${getScaledFont(13)}" font-weight="700" fill="${color}">${percent}%</text>`);
    }
    startAngle = endAngle;
  });

  return `
    <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="pie chart">
      ${slices.join("")}
      <circle cx="${cx}" cy="${cy}" r="${innerRadius}" fill="#ffffff" />
      <text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="${getScaledFont(14)}" fill="${theme.axis}">合計</text>
      <text x="${cx}" y="${cy + 22}" text-anchor="middle" font-size="${getScaledFont(24)}" font-weight="800" fill="${theme.accent}">${escapeHtml(formatValue(total))}</text>
    </svg>
  `;
}

function buildLegend(points, theme, singleSeriesName) {
  const showLegend = document.getElementById("showLegend").checked;
  if (!showLegend) return "";

  const chartType = document.getElementById("chartType").value;
  let items = [{ label: singleSeriesName, color: theme.series[0] }];
  if (chartType === "pie") {
    items = points.map((point, index) => ({ label: point.label, color: theme.series[index % theme.series.length] }));
  }

  return `
    <div class="legend">
      ${items.map(item => `
        <span class="legend-item">
          <span class="legend-chip" style="background:${item.color}"></span>
          <span>${escapeHtml(item.label)}</span>
        </span>
      `).join("")}
    </div>
  `;
}

function buildMultiSeriesLegend(allSeries, theme) {
  const showLegend = document.getElementById("showLegend").checked;
  if (!showLegend) return "";
  return `
    <div class="legend">
      ${allSeries.map((entry, index) => `
        <span class="legend-item">
          <span class="legend-chip" style="background:${theme.series[index % theme.series.length]}"></span>
          <span>${escapeHtml(entry.series.name)}</span>
        </span>
      `).join("")}
    </div>
  `;
}

function buildScatterLegend(scatterData, theme) {
  const showLegend = document.getElementById("showLegend").checked;
  if (!showLegend) return "";
  return `
    <div class="legend">
      <span class="legend-item">
        <span class="legend-chip" style="background:${theme.series[0]}"></span>
        <span>X: ${escapeHtml(scatterData.xSeries.name)}</span>
      </span>
      <span class="legend-item">
        <span class="legend-chip" style="background:${theme.series[1]}"></span>
        <span>Y: ${escapeHtml(scatterData.ySeries.name)}</span>
      </span>
    </div>
  `;
}

function buildTableHtml(parsed) {
  const fontSize = getScaledFont(15);
  const labelColumnIndex = Number(document.getElementById("labelColumn").value || 0);
  const orderedIndexes = [labelColumnIndex, ...parsed.header.map((_, index) => index).filter(index => index !== labelColumnIndex)];
  const orderedHeader = orderedIndexes.map(index => parsed.header[index]);
  const orderedRows = parsed.rows.map(row => orderedIndexes.map(index => row[index]));
  const headHtml = orderedHeader.map(cell => `<th>${escapeHtml(cell)}</th>`).join("");
  const bodyHtml = orderedRows.map(row => `
    <tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>
  `).join("");
  return `
    <div class="chart-header">
      <h2 class="chart-title" style="font-size:${getScaledFont(28)}px">${escapeHtml(document.getElementById("chartTitle").value || "表タイトル")}</h2>
      <p class="chart-subtitle" style="font-size:${getScaledFont(14)}px">${escapeHtml(document.getElementById("chartSubtitle").value || "")}</p>
    </div>
    <table class="data-table" style="font-size:${fontSize}px">
      <thead><tr>${headHtml}</tr></thead>
      <tbody>${bodyHtml}</tbody>
    </table>
    <div class="footer-note">Source data rows: ${parsed.rows.length} / Columns: ${parsed.header.length} / Label: ${escapeHtml(parsed.header[labelColumnIndex] || "")}</div>
  `;
}

function updateControlVisibility() {
  const outputMode = document.getElementById("outputMode").value;
  const chartType = document.getElementById("chartType").value;
  const secondaryWrap = document.getElementById("seriesIndexSecondary").closest(".control");
  const valueUnitWrap = document.getElementById("valueUnit").closest(".control");
  const markerToggle = document.getElementById("showMarkers").closest(".toggle");
  const chartTypeWrap = document.getElementById("chartType").closest(".control");
  const labelWrap = document.getElementById("labelColumn").closest(".control");
  const seriesWrap = document.getElementById("seriesIndex").closest(".control");
  const sizeWrap = document.getElementById("chartSize").closest(".control");
  const legendToggle = document.getElementById("showLegend").closest(".toggle");
  const valueToggle = document.getElementById("showValues").closest(".toggle");
  const gridToggle = document.getElementById("showGrid").closest(".toggle");

  chartTypeWrap.style.display = outputMode === "chart" ? "" : "none";
  labelWrap.style.display = "";
  seriesWrap.style.display = outputMode === "chart" ? "" : "none";
  sizeWrap.style.display = "";
  secondaryWrap.style.display = outputMode === "chart" && chartType === "scatter" ? "" : "none";
  valueUnitWrap.style.display = outputMode === "chart" && chartType !== "scatter" ? "" : "none";
  markerToggle.style.display = outputMode === "chart" && (chartType === "line" || chartType === "area") ? "flex" : "none";
  legendToggle.style.display = outputMode === "chart" ? "flex" : "none";
  valueToggle.style.display = outputMode === "chart" ? "flex" : "none";
  gridToggle.style.display = outputMode === "chart" ? "flex" : "none";
}
